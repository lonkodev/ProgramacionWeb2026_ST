<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Notas</title>
</head>
<body>
    <h1>Ingreso de Notas</h1>

    <form action="/notas" method="post">

        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>
        <br><br>

        <label for="nota1">Nota 1</label>
        <input type="number" id="nota1" name="nota1" min="1" max="7" step="0.1" required>
        <br><br>

        <label for="nota2">Nota 2</label>
        <input type="number" id="nota2" name="nota2" min="1" max="7" step="0.1" required>
        <br><br>

        <label for="nota3">Nota 3</label>
        <input type="number" id="nota3" name="nota3" min="1" max="7" step="0.1" required>
        <br><br>

        <label for="nota4">Nota 4</label>
        <input type="number" id="nota4" name="nota4" min="1" max="7" step="0.1" required>
        <br><br>

        <button type="submit">Registrar Notas</button>

    </form>

    <br>
    <a href="/notas/lista">Ver lista de notas →</a>

</body>
</html>
